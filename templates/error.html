{% extends "base.html" %}
{% block title %}Error - Qualys DA{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
    <div class="card" style="text-align:center;max-width:500px;">
        <h1 style="font-size:48px;color:var(--danger);margin-bottom:8px;">{{ error_code or 500 }}</h1>
        <h2 style="margin-bottom:16px;">{{ error_title or 'Something went wrong' }}</h2>
        <p style="color:var(--text-muted);margin-bottom:24px;">{{ error_message or 'An unexpected error occurred. Please try again.' }}</p>
        <a href="/" class="btn btn-primary">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
